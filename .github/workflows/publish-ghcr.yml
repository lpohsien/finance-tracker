name: Build and Publish GHCR Image

on:
  push:
  workflow_dispatch:
    inputs:
      image_name:
        description: Override image name (without registry/owner)
        required: false
        default: finance-tracker
      push_latest:
        description: Publish the latest tag for this run
        required: false
        type: boolean
        default: true

env:
  IMAGE_NAME: finance-tracker

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.inputs.image_name || env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.push_latest == 'true') || (github.event_name != 'workflow_dispatch' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

