services:
  backend:
    # Use a prebuilt image when FINANCE_TRACKER_IMAGE is set.
    # Falls back to local build/tag for development on Pi.
    image: ${FINANCE_TRACKER_IMAGE:-finance-tracker:pi-local}
    build:
      context: .
      dockerfile: Dockerfile
    platform: ${DOCKER_PLATFORM:-linux/arm64}
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data/finance.db
      - SECRET_KEY=${SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://localhost}
      - PYTHONDONTWRITEBYTECODE=1
      - TMPDIR=/tmp
    # Bind to localhost only. Tailscale Serve/Funnel should proxy this port.
    ports:
      - "127.0.0.1:8000:8000"
    # Keep container filesystem read-only to avoid overlay writes on SD card.
    read_only: true
    # Put temp files in RAM.
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    volumes:
      - /mnt/usb1/data:/app/data
    # Keep logs small and rotated to reduce persistent writes.
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
